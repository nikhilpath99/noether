kind: noether.core.optimizer.MuonComposite
lr: 0.01
momentum: 0.95
weight_decay: 0.01
secondary:
  kind: noether.core.optimizer.Lion
  lr: 5.0e-5
  weight_decay: 0.05
clip_grad_norm: 1.0
schedule_config:
  kind: noether.core.schedules.LinearWarmupCosineDecaySchedule
  warmup_percent: 0.05
  end_value: 1.0e-6
  max_value: ${model.optimizer_config.lr}
