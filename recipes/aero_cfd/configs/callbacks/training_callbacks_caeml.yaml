- kind: noether.core.callbacks.CheckpointCallback
  every_n_epochs: 10
  save_weights: false
  save_latest_weights: true
  save_latest_optim: true
# validation loss
- &val_loss
  kind: noether.training.callbacks.OfflineLossCallback
  batch_size: 1
  every_n_epochs: 1
  dataset_key: val
- kind: noether.core.callbacks.BestCheckpointCallback
  every_n_epochs: 1
  metric_key: loss/val/total
# test loss
- kind: aero_cfd.callbacks.AeroMetricsCallback
  batch_size: 1
  every_n_epochs: 1
  dataset_key: val
  forward_properties: ${model.forward_properties}
- &chunked_test_metrics
  kind: aero_cfd.callbacks.AeroMetricsCallback
  batch_size: 1
  every_n_epochs: ${trainer.max_epochs}
  dataset_key: chunked_test
  forward_properties: ${model.forward_properties}
  chunked_inference: true
  chunk_properties: ${chunk_properties}
  sample_size_property: ${sample_size_property}
  chunk_size: ${chunk_size}
- kind: noether.core.callbacks.EmaCallback
  every_n_epochs: 10
  save_weights: false
  save_last_weights: false
  save_latest_weights: true
  target_factors:
    - 0.9999
  # nested eval callbacks: run validation with EMA weights swapped in. Metric keys are auto-prefixed
  # with ``ema=<factor>/`` (e.g. ``ema=0.9999/loss/val/total``).
  eval_callbacks:
    - *val_loss
    - *chunked_test_metrics