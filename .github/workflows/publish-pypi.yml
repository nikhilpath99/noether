name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v2.0.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download wheel from GitHub Release
        run: gh release download ${{ inputs.tag }} --pattern "*.whl" --dir dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
